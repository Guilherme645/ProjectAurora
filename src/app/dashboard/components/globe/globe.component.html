<div 
  class="bg-white overflow-hidden transition-all duration-300"
  [ngClass]="isFullscreen ? 'fixed inset-0 z-[100] w-screen h-screen' : 'relative w-full h-full'"
>

  <div
    #globeContainer
    class="absolute inset-0 cursor-grab active:cursor-grabbing transition-opacity duration-500"
    [class.opacity-0]="isMapMode"
    [class.pointer-events-none]="isMapMode"
  ></div>

  <div
    #mapContainer
    class="absolute inset-0 transition-opacity duration-500"
    [class.opacity-0]="!isMapMode"
    [class.pointer-events-none]="!isMapMode"
  ></div>

  <button 
    (click)="toggleFullscreen()"
    class="absolute top-4 right-4 z-10 p-2 bg-white/90 hover:bg-white rounded-md shadow-md text-[#6B7280] hover:text-[#111827] transition-colors border border-gray-200"
    [title]="isFullscreen ? 'Sair da tela cheia' : 'Tela cheia'"
  >
    <svg *ngIf="!isFullscreen" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
    </svg>
    <svg *ngIf="isFullscreen" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
    </svg>
  </button>

</div>
